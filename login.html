<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal login</title>
<style>
body{font-family:system-ui,sans-serif;max-width:40rem;margin:2rem auto;padding:0 1rem;line-height:1.6}
label{display:block;margin:.8rem 0}
input{font-size:1rem;padding:.3rem;width:100%;max-width:24rem;box-sizing:border-box}
button{font-size:1rem;padding:.5rem 1rem;cursor:pointer}
#msg{margin-top:1rem;color:#a00;font-family:monospace}
</style>
</head>
<body>
<h1>Portal login</h1>
<form id="login">
  <label>Username
    <input id="user" name="user" type="text" autocomplete="off">
  </label>
  <label>Password
    <input id="pass" name="pass" type="password" autocomplete="off">
  </label>
  <button id="login-btn" type="submit">Log in</button>
</form>
<div id="msg"></div>
<script>
// Every login attempt fails, by design: there is no account and no page
// behind this form. The error code is assembled at runtime so it can only be
// observed by actually attempting a login.
document.getElementById('login').addEventListener('submit', function (e) {
  e.preventDefault();
  document.getElementById('msg').textContent =
    'Invalid credentials (' + 'ERR-LOGIN-' + (400 + 1) + ')';
});
</script>
</body>
</html>
