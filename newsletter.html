<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field notes newsletter</title>
<style>
body{font-family:system-ui,sans-serif;max-width:40rem;margin:2rem auto;padding:0 1rem;line-height:1.6}
input{font-size:1rem;padding:.3rem;width:100%;max-width:24rem;box-sizing:border-box}
button{font-size:1rem;padding:.5rem 1rem;cursor:pointer;margin-top:.5rem}
</style>
</head>
<body>
<h1>Field notes newsletter</h1>
<p>A short, fictional monthly digest. Enter an email address and press
subscribe to join.</p>
<form id="signup">
  <label>Email
    <input id="email" name="email" type="email" autocomplete="off" required>
  </label>
  <button id="subscribe" type="submit">Subscribe</button>
</form>
<script>
document.getElementById('signup').addEventListener('submit', function (e) {
  e.preventDefault();
  // Post-submit sentinel is assembled at runtime so it can only be observed
  // by actually subscribing, never by reading the page source.
  document.body.innerHTML =
    '<h1>' + ['SUBSCRIBED', 'OK-' + (3000 + 321)].join('-') + '</h1>' +
    '<p>You are on the list.</p>';
});
</script>
</body>
</html>
